<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capture Overlay</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        cursor: crosshair;
        user-select: none;
        background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #root {
        position: relative;
        width: 100%;
        height: 100%;
        background: #050505;
      }

      #snapshot {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: fill;
        pointer-events: none;
      }

      #shade {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.36);
      }

      #selection {
        position: absolute;
        border: 2px solid rgba(255, 255, 255, 0.92);
        background: transparent;
        box-shadow: 0 0 0 99999px rgba(0, 0, 0, 0.28);
        display: none;
      }

      #hint {
        position: absolute;
        left: 24px;
        bottom: 24px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(15, 15, 15, 0.72);
        color: #fff;
        font-size: 13px;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <img id="snapshot" alt="" />
      <div id="shade"></div>
      <div id="selection"></div>
      <div id="hint">拖拽选择截图区域，按 Esc 取消</div>
    </div>
    <script>
      const root = document.getElementById('root')
      const snapshotElement = document.getElementById('snapshot')
      const shadeElement = document.getElementById('shade')
      const selectionElement = document.getElementById('selection')
      const cropCanvas = document.createElement('canvas')
      let captureChannel = ''
      let displayBounds = { x: 0, y: 0, width: window.innerWidth, height: window.innerHeight }
      let dragging = false
      let dragStart = null
      let submitting = false
      let snapshotReady = Promise.resolve()

      function sendToParent(payload) {
        if (!captureChannel || !window.utools || typeof window.utools.sendToParent !== 'function') {
          return
        }

        window.utools.sendToParent(captureChannel, payload)
      }

      function clampRect(rect) {
        const x = Math.max(0, Math.min(rect.x, window.innerWidth))
        const y = Math.max(0, Math.min(rect.y, window.innerHeight))
        const right = Math.max(0, Math.min(rect.x + rect.width, window.innerWidth))
        const bottom = Math.max(0, Math.min(rect.y + rect.height, window.innerHeight))

        return {
          x: Math.min(x, right),
          y: Math.min(y, bottom),
          width: Math.abs(right - x),
          height: Math.abs(bottom - y),
        }
      }

      function renderSelection(rect) {
        const nextRect = clampRect(rect)
        selectionElement.style.display = nextRect.width > 0 && nextRect.height > 0 ? 'block' : 'none'
        shadeElement.style.display = nextRect.width > 0 && nextRect.height > 0 ? 'none' : 'block'
        selectionElement.style.left = `${nextRect.x}px`
        selectionElement.style.top = `${nextRect.y}px`
        selectionElement.style.width = `${nextRect.width}px`
        selectionElement.style.height = `${nextRect.height}px`
      }

      function buildSelectionRect(event) {
        return clampRect({
          x: Math.min(dragStart.x, event.clientX),
          y: Math.min(dragStart.y, event.clientY),
          width: Math.abs(event.clientX - dragStart.x),
          height: Math.abs(event.clientY - dragStart.y),
        })
      }

      async function cropSelectionImage(rect) {
        const nextRect = clampRect(rect)
        if (nextRect.width < 4 || nextRect.height < 4) {
          return ''
        }

        try {
          await snapshotReady
        } catch {
          return ''
        }
        const naturalWidth = Number(snapshotElement.naturalWidth)
        const naturalHeight = Number(snapshotElement.naturalHeight)

        if (!Number.isFinite(naturalWidth) || !Number.isFinite(naturalHeight) || naturalWidth <= 0 || naturalHeight <= 0) {
          return ''
        }

        const scaleX = naturalWidth / Math.max(1, window.innerWidth)
        const scaleY = naturalHeight / Math.max(1, window.innerHeight)
        const sourceX = Math.max(0, Math.round(nextRect.x * scaleX))
        const sourceY = Math.max(0, Math.round(nextRect.y * scaleY))
        const sourceWidth = Math.max(1, Math.round(nextRect.width * scaleX))
        const sourceHeight = Math.max(1, Math.round(nextRect.height * scaleY))
        const context = cropCanvas.getContext('2d')

        if (!context) {
          return ''
        }

        cropCanvas.width = sourceWidth
        cropCanvas.height = sourceHeight
        context.clearRect(0, 0, sourceWidth, sourceHeight)
        context.drawImage(
          snapshotElement,
          sourceX,
          sourceY,
          sourceWidth,
          sourceHeight,
          0,
          0,
          sourceWidth,
          sourceHeight,
        )

        return cropCanvas.toDataURL('image/png')
      }

      async function submitSelection(rect) {
        if (!rect || rect.width < 4 || rect.height < 4) {
          return
        }

        if (submitting) {
          return
        }

        submitting = true
        const image = await cropSelectionImage(rect)

        if (!image) {
          submitting = false
          sendToParent({ type: 'cancel' })
          return
        }

        sendToParent({
          type: 'submit',
          bounds: {
            x: displayBounds.x + rect.x,
            y: displayBounds.y + rect.y,
            width: rect.width,
            height: rect.height,
          },
          image,
        })
      }

      root.addEventListener('mousedown', (event) => {
        if (event.button !== 0) {
          return
        }

        dragging = true
        dragStart = { x: event.clientX, y: event.clientY }
        renderSelection({ x: event.clientX, y: event.clientY, width: 0, height: 0 })
      })

      window.addEventListener('mousemove', (event) => {
        if (!dragging || !dragStart) {
          return
        }

        renderSelection(buildSelectionRect(event))
      })

      window.addEventListener('mouseup', (event) => {
        if (!dragging || !dragStart) {
          return
        }

        dragging = false
        const rect = buildSelectionRect(event)
        dragStart = null
        void submitSelection(rect)
      })

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          sendToParent({ type: 'cancel' })
        }
      })

      window.__SCREEN_TRANSLATION_CAPTURE_INIT__ = async function initCaptureOverlay(payload) {
        captureChannel = payload && typeof payload.channel === 'string' ? payload.channel : ''
        displayBounds = payload && payload.displayBounds ? payload.displayBounds : displayBounds
        const imageDataUrl = payload && typeof payload.imageDataUrl === 'string' ? payload.imageDataUrl.trim() : ''

        snapshotReady = new Promise((resolve, reject) => {
          snapshotElement.onload = () => resolve()
          snapshotElement.onerror = () => reject(new Error('snapshot-load-failed'))
        })

        if (!imageDataUrl) {
          snapshotReady = Promise.reject(new Error('missing-snapshot-image'))
          return
        }

        snapshotElement.src = imageDataUrl
      }
    </script>
  </body>
</html>
