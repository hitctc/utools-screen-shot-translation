<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>uTools Screen Translation Dev Entry</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ecebe7;
        --surface: #f7f7f4;
        --border: #d8d7d1;
        --text-primary: #111111;
        --text-secondary: #5e5e5e;
        --accent: #d71921;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg: #0b0b0b;
          --surface: #151515;
          --border: #2b2b2b;
          --text-primary: #f5f5f2;
          --text-secondary: #8f8f87;
          --accent: #ff6b70;
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        padding: 12px;
        background: var(--bg);
        color: var(--text-primary);
        font-family: "Space Grotesk", "PingFang SC", "Helvetica Neue", sans-serif;
      }

      .shell {
        display: grid;
        gap: 16px;
        min-height: calc(100vh - 24px);
        align-content: start;
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--surface);
      }

      .label {
        margin: 0;
        color: var(--text-secondary);
        font-family: "Space Mono", monospace;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .title {
        margin: 0;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 0.94;
        letter-spacing: -0.04em;
      }

      .copy,
      .link {
        margin: 0;
        color: var(--text-secondary);
        line-height: 1.6;
      }

      .link {
        color: var(--accent);
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <section class="shell">
      <p class="label">Screen Translation Dev Entry</p>
      <h1 class="title">正在接入开发页面</h1>
      <p id="dev-entry-status" class="copy">正在连接开发服务器…</p>
      <a id="dev-entry-link" class="link" href="http://127.0.0.1:5173/index.html">
        http://127.0.0.1:5173/index.html
      </a>
    </section>
    <script src="./dev-entry-fallback.js"></script>
  </body>
</html>
