<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        color-scheme: light;
        --boot-bg: #ecebe7;
        --boot-surface: #f7f7f4;
        --boot-border: #d8d7d1;
        --boot-text-primary: #111111;
        --boot-text-secondary: #5e5e5e;
        --boot-accent: #d71921;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --boot-bg: #0b0b0b;
          --boot-surface: #151515;
          --boot-border: #2b2b2b;
          --boot-text-primary: #f5f5f2;
          --boot-text-secondary: #8f8f87;
          --boot-accent: #d71921;
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--boot-bg);
        color: var(--boot-text-primary);
        font-family: "Space Grotesk", "PingFang SC", "Helvetica Neue", sans-serif;
      }

      .app-boot-shell {
        min-height: 100vh;
        padding: 12px;
      }

      .app-boot-shell__panel {
        display: grid;
        gap: 16px;
        min-height: calc(100vh - 24px);
        align-content: start;
        padding: 18px 18px 24px;
        border: 1px solid var(--boot-border);
        border-radius: 16px;
        background: var(--boot-surface);
      }

      .app-boot-shell__label {
        margin: 0;
        color: var(--boot-text-secondary);
        font-family: "Space Mono", monospace;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .app-boot-shell__title {
        margin: 0;
        font-size: clamp(30px, 5vw, 48px);
        line-height: 0.92;
        font-weight: 700;
        letter-spacing: -0.04em;
      }

      .app-boot-shell__copy {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        width: fit-content;
        min-height: 34px;
        padding: 0 14px;
        border: 1px solid var(--boot-border);
        border-radius: 999px;
        color: var(--boot-text-secondary);
        font-size: 13px;
        line-height: 1.5;
      }

      .app-boot-shell__copy::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--boot-accent);
      }
    </style>
  </head>
  <body>
    <div id="app-boot-shell" class="app-boot-shell" aria-hidden="true">
      <div class="app-boot-shell__panel">
        <p class="app-boot-shell__label">SCREEN TRANSLATION</p>
        <h1 class="app-boot-shell__title">截屏&翻译</h1>
        <p class="app-boot-shell__copy">正在准备三步流程…</p>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
