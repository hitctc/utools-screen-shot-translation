<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: light;
        --boot-bg: #f5f5f2;
        --boot-surface: #ffffff;
        --boot-border: #d6d6d2;
        --boot-text-primary: #111111;
        --boot-text-secondary: #6b6b66;
        --boot-accent: #d71921;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --boot-bg: #000000;
          --boot-surface: #111111;
          --boot-border: #242424;
          --boot-text-primary: #f2f2f2;
          --boot-text-secondary: #8b8b8b;
          --boot-accent: #d71921;
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--boot-bg);
        color: var(--boot-text-primary);
        font-family: 'Space Grotesk', 'PingFang SC', 'Helvetica Neue', sans-serif;
      }

      .app-boot-shell {
        min-height: 100vh;
        padding: 10px;
      }

      .app-boot-shell__panel {
        display: grid;
        gap: 12px;
        min-height: calc(100vh - 20px);
        align-content: start;
        padding: 16px 16px 18px;
        border: 1px solid var(--boot-border);
        border-radius: 14px;
        background: var(--boot-surface);
      }

      .app-boot-shell__label {
        margin: 0;
        color: var(--boot-text-secondary);
        font-family: 'Space Mono', monospace;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .app-boot-shell__title {
        margin: 0;
        font-size: clamp(28px, 5vw, 44px);
        line-height: 0.94;
        font-weight: 500;
        letter-spacing: -0.03em;
      }

      .app-boot-shell__copy {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        width: fit-content;
        min-height: 30px;
        padding: 0 12px;
        border: 1px solid var(--boot-border);
        border-radius: 999px;
        color: var(--boot-text-secondary);
        font-size: 12px;
        line-height: 1.5;
      }

      .app-boot-shell__copy::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--boot-accent);
      }
    </style>
  </head>
  <body>
    <div id="app-boot-shell" class="app-boot-shell" aria-hidden="true">
      <div class="app-boot-shell__panel">
        <p class="app-boot-shell__label">截屏翻译</p>
        <h1 class="app-boot-shell__title">正在准备界面</h1>
        <p class="app-boot-shell__copy">正在载入记录与设置…</p>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
